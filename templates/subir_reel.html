<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Subir Reel - NOBIRU</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="modo-oscuro" style="background: #0f172a; color: white; font-family: sans-serif;">
    <div class="contenedor" style="max-width: 500px; margin: 50px auto; padding: 20px;">
        
        <a href="/reels" style="color: #8b94aa; text-decoration: none;">← Volver</a>
        <h2 style="margin-top: 15px;">Compartir Nuevo Reel</h2>

        <form action="/subir-reel" method="POST" enctype="multipart/form-data" style="background: #16233c; padding: 20px; border-radius: 10px; margin-top: 20px;">
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; color: #8b94aa;">Título del reel</label>
                <input type="text" name="titulo" required style="width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 5px; color: white; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; color: #8b94aa;">Selecciona tu Video (MP4)</label>
                <input type="file" name="video" accept="video/*" required style="color: white;">
            </div>

            <button type="submit" style="width: 100%; background: #7b2cff; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer;">
                🚀 Compartir Video Público
            </button>
        </form>

    </div>
</body>
</html>
