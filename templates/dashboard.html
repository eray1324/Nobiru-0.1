<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <title>Dashboard - NOBIRU</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body>

<div class="dashboard">

    <h1>Bienvenido, {{ usuario }}</h1>

    <div class="insignia">

        <h2>🏆 Insignia actual</h2>

        <div class="bronze-badge">
            BRONCE
        </div>

    </div>

    <div class="cards">

        <div class="card">
            <h2>📚 Cuestionarios</h2>
            <p>Crear y resolver cuestionarios.</p>
        </div>

        <div class="card">
            <h2>🎥 Reels Educativos</h2>
            <p>Videos cortos para aprender.</p>
        </div>

        <div class="card">
            <h2>📖 Biblioteca</h2>
            <p>PDFs, libros y documentos.</p>
        </div>

        <div class="card">
            <h2>👥 Comunidad</h2>
            <p>Preguntas y consejos.</p>
        </div>

        <div class="card">
            <h2>⭐ Favoritos</h2>
            <p>Tus materiales guardados.</p>
        </div>

    </div>

    <br>

    <a href="/logout">
        <button>Cerrar sesión</button>
    </a>

</div>

</body>
</html>
