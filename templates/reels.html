<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reels - NOBIRU</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="modo-oscuro" style="background: #0f172a; color: white; font-family: sans-serif;">
    <div class="contenedor" style="max-width: 500px; margin: 0 auto; padding: 20px;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>Reels Educativos</h1>
            <a href="/subir-reel" style="background: #7b2cff; color: white; text-decoration: none; padding: 10px 15px; border-radius: 5px; font-weight: bold;">+ Subir</a>
        </div>

        <div class="feed-reels">
            {% for reel in reels %}
            <div class="card-reel" style="background: #16233c; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center;">
                <h3>{{ reel[1] }}</h3> <video src="{{ reel[2] }}" controls style="width: 100%; max-height: 400px; border-radius: 8px; background: black;"></video>
                <p style="color: #8b94aa; font-size: 12px; margin-top: 8px;">Subido por: @{{ reel[3] }}</p>
            </div>
            {% else %}
            <p style="color: #8b94aa; text-align: center;">No hay reels compartidos aún. ¡Sé el primero!</p>
            {% endfor %}
        </div>
        
    </div>
</body>
</html>
