<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comunidad - NOBIRU</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="modo-oscuro" style="background: #0f172a; color: white; font-family: sans-serif; padding: 20px;">
    <div style="max-width: 700px; margin: 0 auto;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1 style="color: #38bdf8; margin: 0;">💬 Comunidad NOBIRU</h1>
            <a href="/dashboard" style="color: #94a3b8; text-decoration: none;">Dashboard</a>
        </div>

        <div style="background: #16233c; padding: 20px; border-radius: 10px; border: 1px solid #233554; margin-bottom: 30px;">
            <h3 style="margin-top: 0;">Comparte tus dudas o comentarios</h3>
            <form action="/comunidad" method="POST">
                <textarea name="comentario" placeholder="Escribe algo para la comunidad..." rows="3" required style="width: 100%; padding: 10px; background: #0f172a; border: 1px solid #233554; color: white; border-radius: 5px; resize: none; margin-bottom: 10px; font-family: sans-serif;"></textarea>
                <button type="submit" style="background: #38bdf8; color: #0f172a; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer;">Publicar Comentario</button>
            </form>
        </div>

        <div style="display: flex; flex-direction: column; gap: 15px;">
            {% for c in comentarios %}
            <div style="background: #16233c; padding: 15px; border-radius: 8px; border: 1px solid #233554;">
                <strong style="color: #38bdf8;">@{{ c[0] }}</strong> 
                <span style="color: #64748b; font-size: 12px;">• {{ c[2].strftime('%d/%m/%Y %H:%M') if c[2] else 'Reciente' }}</span>
                <p style="margin: 5px 0 0 0; color: #cbd5e1; line-height: 1.4;">{{ c[1] }}</p>
            </div>
            {% else %}
            <p style="text-align: center; color: #8b94aa;">Aún no hay comentarios. ¡Sé el primero en escribir!</p>
            {% endfor %}
        </div>

    </div>
</body>
</html>
