<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <title>Biblioteca - NOBIRU</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <!-- ENCABEZADO -->
    <div class="encabezado">

        <h1 class="titulo-biblioteca">
            Biblioteca
        </h1>

        <a href="/subir-material" class="boton-mas">
            +
        </a>

    </div>


    <!-- BARRA DE BÚSQUEDA -->
    <div class="buscador">

        <input
            type="text"
            placeholder="Buscar material...">

    </div>


    <h2>Materiales compartidos</h2>


    <!-- FEED -->
    {% for material in materiales %}

    <div class="card-material">

        <h3>{{ material[1] }}</h3>

        <p>{{ material[2] }}</p>

        <p>
            <strong>Autor:</strong>
            {{ material[3] }}
        </p>

        <p>
            <strong>Fecha:</strong>
            {{ material[4] }}
        </p>

        {% if material[5] %}

        <a href="{{ url_for('static',
        filename='uploads/pdfs/' + material[5]) }}">

            <button>

                📥 Descargar PDF

            </button>

        </a>

        {% endif %}

    </div>

    {% endfor %}


    <br><br>

    <a href="/dashboard">

        <button>

            ⬅ Volver al Dashboard

        </button>

    </a>

</body>
</html>
